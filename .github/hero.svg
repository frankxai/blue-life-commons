<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Blue Life Commons</title>
  <desc id="desc">An open Ocean Intelligence commons for source-led artifacts, ethics review, and public contribution workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041014"/>
      <stop offset="0.68" stop-color="#06202A"/>
      <stop offset="1" stop-color="#083241"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4FD1C5"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#4FD1C5" stroke-width="1">
    <path d="M80 72H1120M80 120H1120M80 168H1120M80 216H1120M80 264H1120"/>
    <path d="M140 48V312M250 48V312M360 48V312M470 48V312M580 48V312M690 48V312M800 48V312M910 48V312M1020 48V312"/>
  </g>
  <g font-family="Inter, Geist, Arial, Helvetica, sans-serif">
