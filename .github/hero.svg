    <text x="72" y="134" fill="#F2FBFF" font-size="48" font-weight="850">Blue Life</text>
    <text x="72" y="188" fill="#F2FBFF" font-size="48" font-weight="850">Commons</text>
    <text x="74" y="229" fill="#A9D7E2" font-size="20" font-weight="500">Marine-life documentation, research collaboration,</text>
    <text x="74" y="258" fill="#A9D7E2" font-size="20" font-weight="500">and conservation workflows with sources and review.</text>

    <g transform="translate(72 296)">
      <rect width="114" height="34" rx="17" fill="#06202A" stroke="#4FD1C5" stroke-opacity="0.62"/>
      <text x="20" y="23" fill="#F2FBFF" font-size="13" font-weight="750">sources</text>
      <rect x="128" width="110" height="34" rx="17" fill="#06202A" stroke="#38BDF8" stroke-opacity="0.62"/>
      <text x="152" y="23" fill="#F2FBFF" font-size="13" font-weight="750">ethics</text>
      <rect x="252" width="122" height="34" rx="17" fill="#06202A" stroke="#F5B84B" stroke-opacity="0.72"/>
      <text x="276" y="23" fill="#F2FBFF" font-size="13" font-weight="750">public artifact</text>
    </g>

    <g transform="translate(570 68)">
      <rect width="520" height="226" rx="20" fill="#071D24" stroke="#4FD1C5" stroke-opacity="0.42"/>
      <g transform="translate(34 48)">
        <rect width="94" height="76" rx="12" fill="#041014" stroke="#4FD1C5" stroke-opacity="0.68"/>
        <text x="24" y="33" fill="#F2FBFF" font-size="14" font-weight="800">Issue</text>
        <text x="20" y="55" fill="#A9D7E2" font-size="12" font-weight="650">request</text>
      </g>
      <g transform="translate(164 48)">
        <rect width="94" height="76" rx="12" fill="#041014" stroke="#38BDF8" stroke-opacity="0.62"/>
        <text x="20" y="33" fill="#F2FBFF" font-size="14" font-weight="800">Sources</text>
        <text x="25" y="55" fill="#A9D7E2" font-size="12" font-weight="650">ledger</text>
      </g>
      <g transform="translate(294 48)">
        <rect width="94" height="76" rx="12" fill="#041014" stroke="#F5B84B" stroke-opacity="0.72"/>
        <text x="24" y="33" fill="#F2FBFF" font-size="14" font-weight="800">Review</text>
        <text x="23" y="55" fill="#A9D7E2" font-size="12" font-weight="650">ethics</text>
      </g>
      <g transform="translate(424 48)">
        <rect width="64" height="76" rx="12" fill="#041014" stroke="#4FD1C5" stroke-opacity="0.68"/>
        <text x="13" y="33" fill="#F2FBFF" font-size="14" font-weight="800">Ship</text>
        <text x="14" y="55" fill="#A9D7E2" font-size="12" font-weight="650">page</text>
      </g>
      <path d="M128 86H164M258 86H294M388 86H424" stroke="url(#line)" stroke-width="3"/>
      <path d="M82 156C150 194 252 194 320 156S436 118 488 156" stroke="#38BDF8" stroke-width="3" fill="none" opacity="0.52"/>
      <text x="38" y="190" fill="#A9D7E2" font-size="13" font-weight="700">Every artifact is source-led, review-gated, and public by default.</text>
