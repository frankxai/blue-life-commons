# Machine-readable artifact metadata schema (JSON Schema, YAML format).
# Documentation: schema/artifact-schema.md
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://blue-life-commons.org/schema/artifact-schema.yaml"
title: Blue Life Commons Artifact Metadata
type: object
required:
  - id
  - type
  - title
  - status
  - sources
  - review
  - outputs
  - contributors
  - license
additionalProperties: true
properties:
  id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
  type:
    type: string
    enum:
      - species-page
      - region-briefing
      - field-mission
      - research-summary
      - dataset-card
      - mcp-connector
      - notebook
      - map-layer
      - partner-profile
      - translation
      - film-script
      - lesson
      - event-report
      - observation-guide
      - funding-proposal
      # --- Welfare, rehab & sanctuary types (added 2026-06-16 per practitioner panel) ---
      - welfare-assessment
      - stranding-protocol
      - rehab-case-card
      - release-criteria
      - sanctuary-profile
      - husbandry-guide
      - necropsy-summary
      # --- Community & knowledge-preservation types ---
      - local-knowledge
      - volunteer-program
      # --- Wisdom & practice types (added 2026-06-17) ---
      - wisdom
      - practice-guide
      # --- Academy & advocacy types (added 2026-06-18) ---
      - educational
      - advocacy
  title:
    type: string
    minLength: 3
  region:
    type: array
    items:
      type: string
  species_group:
    type: array
    items:
      type: string
      enum: [cetaceans, pinnipeds, turtles, sharks-rays, reefs]
  species:
    type: array
    items:
      type: string
  difficulty:
    type: string
    enum: [beginner, intermediate, advanced]
  audience:
    type: array
    items:
      type: string
  status:
    type: string
    enum: [draft, needs-sources, needs-expert-review, approved, published]
  translates:
    type: string
  sources:
    type: array
    items:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: string
        accessed:
          type: string
        doi:
          type: string
        tier:
          description: "SOURCES.md tier — 1 primary scientific, 2 institutional, 3 journalistic/educational."
          type: integer
          enum: [1, 2, 3]
        license:
          description: "License of the cited dataset/source, e.g. CC-BY-4.0, CC-BY-NC-4.0, CC0."
          type: string
        commercial_use_ok:
          description: "Whether the source permits commercial reuse. Guards the impact/hypercert path from building a commercial claim on a non-commercial source."
          type: boolean
  # --- Scientific-integrity fields (optional, additive — added 2026-06-15 per expert panel) ---
  sensitivity:
    description: "Location-data sensitivity, per the GBIF four-category generalization model. Controls how precisely locations may be published for vulnerable taxa."
    type: object
    properties:
      tier:
        type: string
        enum: [public, low, medium, high, extreme]
      rationale:
        type: string
      generalized_to:
        description: "Coarsening applied, e.g. '0.1deg', 'regional', 'none'."
        type: string
  iucn:
    description: "IUCN Red List status with provenance, so staleness is visible. A category without an assessment date is not current truth."
    type: object
    properties:
      category:
        type: string
        enum: [EX, EW, CR, EN, VU, NT, LC, DD, NE]
      assessment_date:
        type: string
      version:
        type: string
      population_trend:
        type: string
        enum: [increasing, stable, decreasing, unknown]
      scope:
        type: string
        enum: [global, regional]
  consensus_state:
    description: "Scientific consensus on the artifact's core claims. Contested/emerging artifacts must represent the disagreement, not pick a winner."
    type: string
    enum: [settled, contested, emerging]
  # --- Welfare as a first-class state (added 2026-06-16; see WELFARE.md) ---
  welfare:
    description: "Animal-welfare state. Frames welfare as an active interest to support, not only a constraint. Affect/mental-state is inferred from validated physiological/behavioural correlates with citation — never narrated. See WELFARE.md."
    type: object
    properties:
      state:
        description: "Population- or individual-level welfare status."
        type: string
        enum: [favourable, pressured, critical, recovering, unknown]
      dominant_stressor:
        description: "Primary welfare pressure, e.g. vessel-noise, bycatch, heat-stress, prey-depletion, entanglement, habitat-loss."
        type: string
      five_domains:
        description: "Brief, cited notes per Mellor Five Domains (nutrition, environment, health, behaviour, mental-state)."
        type: object
        additionalProperties: true
      confidence:
        description: "Epistemic basis for the welfare claim — never assert measured when it is modeled or expert opinion."
        type: string
        enum: [measured, modeled, expert-opinion]
  disturbance_budget:
    description: "Cumulative human-pressure capacity for a place/season/population (vessels, noise, approaches). Replaces per-actor 'don't harm' with a carrying-capacity model. See WELFARE.md."
    type: object
    properties:
      scope:
        type: string
      season:
        type: string
      capacity_note:
        type: string
      utilization:
        type: string
        enum: [low, moderate, high, exceeded, unknown]
  individual_animal:
    description: "True for artifacts about a single animal (rehab-case-card, sanctuary residents). Triggers the strictest location/dignity rules in ETHICS.md — no precise locations, ever, including post-release."
    type: boolean
  last_verified:
    description: "ISO date the artifact's factual claims were last checked against current sources. 'approved' is not 'still true'; this surfaces staleness."
    type: string
  consent:
    description: "For local-knowledge artifacts: provenance + consent record for community/Indigenous knowledge (who shared it, permission to publish, attribution preference)."
    type: object
    additionalProperties: true
  review:
    type: object
    required: [science, ethics, editor]
    properties:
      science:
        type: string
        enum: [pending, required, approved, not-applicable]
      ethics:
        type: string
        enum: [pending, required, approved, not-applicable]
      editor:
        type: string
        enum: [pending, required, approved, not-applicable]
  outputs:
    type: object
    required: [website_path, github_path]
    properties:
      website_path:
        type: string
      github_path:
        type: string
      map_layer:
        type: boolean
  impact:
    type: object
    properties:
      claim:
        type: string
      eligible_for_hypercert:
        type: boolean
  contributors:
    type: array
    minItems: 1
    items:
      type: object
      required: [github]
      properties:
        github:
          type: string
  license:
    type: string
