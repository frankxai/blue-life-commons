      cut near her tail area led scientists to conclude that the whale had likely collided with a ship. Sperm Whales are the
      largest toothed mammals in the world and can be identified by their large, block-shaped head that can take up more than
      a quarter of their total length. While Sperm Whales are not the largest whale species, their brains are the largest
