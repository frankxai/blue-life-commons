    source: 'Photo by U.S. Fish and Wildlife Service

      Two distressed sea turtles rescued on the coast after winter storms have taken an important next step in their journey
      to return to the ocean. On April 21, they caught a flight in Seattle aboard a U.S. Coast Guard C-130 transport plane
      to finish their rehabilitation at Sea World San Diego before eventual release to their home waters in the Pacific Ocean.


      Tucker, a male olive ridley sea turtle that has been rehabbing at the Seattle Aquarium, and Comber, a Pacific green
      sea turtle that has been rehabbing at Vancouver Aquarium in Vancouver, BC. The turtles were found comatose, hypothermic
      and malnourished following winter storms in Oregon and Canada. The olive ridley is listed as endangered under the Endangered
      Species Act, and the Pacific green sea turtle is listed as threatened.'
