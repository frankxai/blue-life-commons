version: '2026-07-03'
updated: '2026-07-03'
purpose: Canonical queue for species primary images, rich embeds, rights, provenance, and generated supporting assets.
policy:
  required_for: Every Markdown species page under content/species, excluding README and _templates files.
  primary_media_definition: Official, partner-granted, owned, public-domain, or open-license media with image-level attribution
    and ethics QA.
  google_images_policy: Discovery only. Never use a Google Images result as a source of record or reusable asset without original-page
    rights verification.
  generated_media_role: Supporting/concept visuals only; never biological evidence, official identification media, maps, charts,
    or conservation claims.
source_profiles:
  noaa_fisheries:
    type: official_institutional
    rights_note: NOAA-created photos are generally usable with NOAA credit; non-NOAA credits require owner permission.
  noaa_program_site:
    type: official_institutional
    rights_note: Check image-level credit/copyright before reuse.
  us_fish_and_wildlife_service:
    type: official_institutional
    rights_note: Check image-level credit/copyright before reuse.
  national_park_service:
    type: official_institutional
    rights_note: Check image-level credit/copyright before reuse.
  florida_museum:
    type: institutional
    rights_note: Use as rich embed/candidate unless image-level license permits reuse.
  manta_trust:
    type: partner_or_ngo
    rights_note: Requires partner grant or explicit asset license for reuse.
  oceanic_society:
    type: partner_or_ngo
    rights_note: Requires partner grant or explicit asset license for reuse.
  royal_botanic_gardens_kew:
    type: institutional
    rights_note: Use as rich embed/candidate unless image-level license permits reuse.
  smithsonian_ocean:
    type: institutional
    rights_note: Use as rich embed/candidate unless image-level license permits reuse.
  iucn_red_list:
    type: authority_source
    rights_note: Use for conservation facts/source cards; do not assume image reuse rights.
  wikimedia_commons:
    type: open_license_candidate
    rights_note: Accept only after file-level license, creator, attribution, and species-match review.
  gbif_media:
    type: open_license_candidate
    rights_note: Occurrence media can be more restrictive than occurrence data; verify multimedia license and publisher terms.
  inaturalist_open_data:
    type: open_license_candidate
    rights_note: Verify individual photo license_code, attribution, observation sensitivity, and commercial-use compatibility.
  partner_media_grant_needed:
    type: partner_or_ngo
    rights_note: Obtain written grant with approved surfaces, credit, revocation/embargo notes, and welfare/location constraints.
