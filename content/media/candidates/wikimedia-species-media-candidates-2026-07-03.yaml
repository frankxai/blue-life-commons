      sea turtle that has been rehabbing at Vancouver Aquarium in Vancouver, BC. The turtles were found comatose, hypothermic
      and malnourished following winter storms in Oregon and Canada. The olive ridley is listed as endangered under the Endangered
      Species Act, and the Pacific green sea turtle is listed as threatened.'
