    credit: Own work
    source: "Detail of red mangrove (Rhizophora mangle) roots in Prado, Bahia state, Brazil.\nMangroves are various kinds\
      \ of trees up to medium height and shrubs that grow in saline coastal sediment habitats in the tropics and subtropics\
      \ \u2013 mainly between latitudes 25\xB0 N and 25\xB0 S. The remaining mangrove forest areas of the world in 2000 was\
      \ 53,190 square miles (137,760 km\xB2) spanning 118 countries and territories.[1][2] The word is used in at least three\
      \ senses: (1) most broadly to refer to the habitat and entire plant assemblage or mangal,[3][page needed] for which\
      \ the terms mangrove forest biome, mangrove swamp and mangrove forest are also used, (2) to refer to all trees and large\
      \ shrubs in the mangrove swamp, and (3) narrowly to refer to the mangrove family of plants, the Rhizophoraceae, or even\
      \ more specifically just to mangrove trees of the genus Rhizophora. The term \"mangrove\" comes to English from Spanish\
      \ (perhaps by way of Portuguese), and is of Caribbean origin, likely Ta\xEDno. It was earlier \"mangrow\" (from Portugues\
      \ mangue or Spanish mangle), but this was corrupted via folk etymology influence of \"grove\".The mangrove biome, or\
      \ mangal, is a distinct saline woodland or shrubland habitat characterized by a depositional coastal environments, where\
      \ fine sediments (often with high organic content) collect in areas protected from high-energy wave action. Mangroves\
      \ dominate three quarters of tropical coastlines.[4] The saline conditions tolerated by various mangrove species range\
      \ from brackish water, through pure seawater (30 to 40 ppt), to water concentrated by evaporation to over twice the\
      \ salinity of ocean seawater (up to 90 ppt).[4][5]"
