    commons_file_page: https://commons.wikimedia.org/wiki/File:Killer_Whales_Hunting_a_Seal.jpg
    image_url: https://upload.wikimedia.org/wikipedia/commons/6/66/Killer_Whales_Hunting_a_Seal.jpg
    mime: image/jpeg
    width: 6720
    height: 4411
    creator: Callan Carpenter
    credit: Own work
    source: This photograph was taken off the Graham Coast, Antarctica from aboard the National Geographic Explorer on January
      3, 2018. It captures one moment during a two-hour encounter between four cooperatively hunting orcas and a crabeater
      seal. The seal, known informally as "Kevin", survived the ordeal despite over three dozen attempts by the orcas to wash
      him off of various ice floes. The orcas repeatedly aligned four abreast and charged directly at the ice floes in a synchronized
      fashion. By swimming in close formation just below the surface of the water, the orcas generated enormous bow waves
      that would wash over the ice floes, dislodging Kevin time and again. Kevin finally escaped by swimming at a 90 degree
      angle to the course of the whales as they dove under his ice floe a final time.
